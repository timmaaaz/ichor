# =============================================================================
# PARKED — ollama is NOT currently used.
#
# The active LLM provider is Gemini (ICHOR_LLM_PROVIDER=gemini). The ichor
# deployment does not depend on ollama, and these manifests are intentionally
# NOT wired into the default dev bring-up: `make dev-bounce` keeps `dev-ollama`
# commented out, and `make dev-apply` does not `kustomize build` this directory.
#
# These manifests are kept in the project so we can switch back to local
# inference quickly. To deploy ollama on demand:
#   kustomize build zarf/k8s/dev/ollama | kubectl apply -f -
#   make ollama-pull-model            # pulls qwen3:14b into the running pod
# then set ICHOR_LLM_PROVIDER=ollama / ICHOR_LLM_HOST on the ichor deployment
# (see zarf/k8s/dev/ichor/dev-ichor-configmap.yaml).
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: ichor-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ichor-system
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ichor-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: 4000m
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: ichor-system
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http
