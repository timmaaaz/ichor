          best-effort cross-domain hook on EVERY bus (b.delegate.Call on each CRUD op — do NOT drop it; it
          is the cross-domain extension point, "no subscriber today" != dead). F2 moved ONLY the durable
          workflow cascade OFF the delegate onto the outbox+relay. The 64-bus delegate.Call drop was
          considered and CANCELLED.

          THREE CROSS-DOMAIN MECHANISMS BY GUARANTEE (the spine of both docs):
            1. Direct app-layer orchestration (several buses, one tx) = must-happen ATOMIC. e.g. pickingapp,
               the Path-B workflow handlers (allocate/createpo BeginTxx+NewWithTx). NOT the delegate.
            2. Outbox -> relay = must-happen ASYNC cascade (domain write -> workflow engine, durable,
               at-least-once). business/sdk/outbox + temporal/relay.go.
            3. Delegate = survivable-if-missed best-effort reaction (domain write -> other domains' handlers;
               Delegate.Call swallows errors). business/sdk/delegate.
          GOVERNANCE rule to state explicitly: register a delegate subscriber ONLY for functionality
          universal across ALL customers (platform invariants: permission-cache recompute permissionsbus.go:56-73,
          WebSocket notify alertws/delegate.go:28-29, rule-cache reload). Customer-specific/configurable cross-
          domain reactions -> WORKFLOWS (per-customer rule-configured), never the delegate. Decision test:
          "needed for EVERY customer, always?" yes=delegate / customer-varying=workflow / must-atomic=orchestration.

          docs/arch/delegate.md — UPDATE (read it first; preserve its structure): delegate = general best-effort
          cross-domain cycle-breaker (unchanged purpose). Add the 3-mechanism table + the governance rule + the
          decision test. State that after F2 the workflow cascade is NO LONGER a delegate subscriber (it is the
          outbox); the delegate's live subscribers are permissions(role/tableaccess/userrole) + alertws(userrole)
          + trigger rule-cache reload. The DelegateHandler type was DELETED (F7.1); enrichment helpers moved to
