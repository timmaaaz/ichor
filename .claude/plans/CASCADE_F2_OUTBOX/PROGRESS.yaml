meta:
  branch: feature/cascade-f2-outbox
  base: master f98c1b6b
  worktree: /Users/jaketimmer/src/work/superior/ichor/ichor-cascade-f2-outbox
  design: .claude/plans/CASCADE_F2_OUTBOX/DESIGN.md
  parent: .claude/plans/CASCADE_DELEGATE_EVENTS/  (F2 pays down FOLLOW_UP §3 / DESIGN §211)
  principle: >
    The delegate is Ardan's CYCLE-BREAKER (best-effort indirect cross-package call), NOT an event
    bus. It stays UNTOUCHED except removing its cascade subscriber. The outbox write is EXPLICIT
    persistence in the unit of work — bus returns the Emit error, mid.BeginCommitRollback rolls
    back. Postgres tx-poison is a backstop, not the mechanism.
  hard_rule: >
    NO double-dispatch window. The old delegate-cascade path and the new outbox+relay path must
    never be live at once (different event ids => dedup won't collapse them => double cascade).
    outbox.Emit is INERT (Writer not injected) until the F5 cutover, which atomically (one commit)
    injects the Writer + starts the relay + removes the cascade subscriber. Mirrors the parent
    plan's P4 gate.
  invariant: >
    Cascade SEMANTICS unchanged (same events fire, same rules match, same loop guard). F2 changes
    DELIVERY only (best-effort -> durable at-least-once + dedup) and PLACEMENT (delegate -> outbox).
  execution_model: >
    Serial SPINE (F0-F3, main context) then PARALLEL FAN-OUT (F4, /spawn-agents, opus, one package
    group per agent) then CUTOVER (F5, main context). Do NOT serialize the ~58-bus edits.
  testing_doctrine: >
    TDD-first / prove-RED (DESIGN §8). Changed packages ONLY; NEVER `go test ./...`. Unique Temporal
    task queue per test; scoped queries; trust `go build -C <worktree>` over gopls squiggles.
  migration_version: "2.42 (master=2.40; buttons branch=2.41, not in this worktree; append-only)"
  do_not_execute_in_this_window: true   # plan authored 2026-06-16; execution begins in a fresh prompt

