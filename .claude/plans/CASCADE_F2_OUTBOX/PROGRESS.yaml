          ORDER BY seq) -> buildEvent (enrichment.go) -> contextWithLineage -> WorkflowTrigger.OnEntityEvent.
          DEDUP: workflow id = workflow-{ruleID}-{eventID}, eventID = outbox row id, REJECT_DUPLICATE (trigger.go).
          LINEAGE: WorkflowLineage visited-set serialized into the row's lineage column, rehydrated before
