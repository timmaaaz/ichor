fan_out:
  F4:
    title: "PARALLEL — outbox.Emit across cascade buses + Path-B/C carrier  (/spawn-agents, opus)"
    status: done
    gate: "after F3 (spine green). INERT until F5 — Writer not injected, so no behavior change."
    note: >
      DONE. PERMISSION PIVOT: subagents are sandboxed to a worktree write-allowlist that excludes
      the domain bus dirs (all 5 fan-out agents + their forks hit the wall and correctly refused to
      bypass). Their READ-ONLY surveys were used to drive a deterministic Python transform run from
      the MAIN context (which has worktree write access). Reference pattern proven on ordersbus first.
      The transform mirrors each function's own error-return zero value (parsed from the func
      signature) and is insertion-only at call sites (delegate.Call left intact) so any extraction
      slip is build-caught, never corrupts existing code. 67 buses / 216 emit sites; full
      business/domain build clean. The 6 del-field core buses whose NewWithTx omits the delegate
      field were hand-fixed (added outbox: b.outbox). KEY: workflow.Business can't hold an
      *outbox.Writer (outbox imports workflow -> cycle) so M2 uses an injected bound-method emitter
      func; the 3 data Path-C handlers CAN import outbox (no cycle).
    note: >
      Embarrassingly parallel; partition by package group, one agent per group, each runs its own
      `go build`. DO NOT serialize. Coverage trip-wire (F0.3) backstops a forgotten Emit.
    tasks:
      - id: F4.1
        title: "~58 cascade buses (the workflowdomains.Registrations() set): add b.outbox.Emit(ctx,data) + `return err` in Create/Update/Delete; keep delegate.Call ONLY where a best-effort subscriber exists (role/tableaccess/userrole), else drop the now-dead call"
        status: done
        done_when: "every Registrations() domain emits; per-package go build green; coverage consistency test green"
      - id: F4.2
        title: "Path B: 6 BeginTxx handlers set ctx=sqldb.WithTx(ctx,tx), thread into bus calls"
        status: done
        done_when: "go build per package; handler tests green"
      - id: F4.3
