          and api/cmd/.../build/all (mux wiring).
      - id: P2.3
        title: "Integration tests (DB-backed detector + HTTP enforcement) + regression"
        status: done
        verified: |
          NEW ruleapi/loopdetect_test.go: Test_DetectCascadeLoops drives the real
          DetectCascadeLoops against seeded Postgres rules w/ a RegisterCoreActions registry —
          self-loop auto-match -> ERROR, convergent changed_to sync -> INFO (NOT blocked),
          cross-rule auto-match loop -> ERROR, forward-only -> INFO only, inactive candidate ->
          no-op. Test_CascadeLoopEnforcement (HTTP): deactivate then RE-activate the seeded
          auto-match update_field self-loop -> 400 InvalidArgument; benign rule -> 200. NEW
          workflowsaveapi dryRunCascadeLoop200: create dry_run self-loop -> Valid=false +
          ValidationResult.Cascade.Errors populated. REGRESSION: full ruleapi pkg (incl.
          Test_CascadeAPI + toggle) and full workflowsaveapi pkg (incl. create/update/dryrun +
          Temporal) GREEN — no legitimate workflow newly blocked.
      - id: P2.4
        title: "Hardening tests (differential vs runtime + must-not-block corpus + Tarjan property + re-arm invariants)"
        status: done
        verified: |
          NEW business/sdk/workflow/cascade_detect_hardening_test.go (pure, no DB):
          (1) DIFFERENTIAL — feeds the same (operator, produced value, condition) matrix to BOTH
            the static evalGate AND the real TriggerProcessor.evaluateFieldCondition, asserting
            they agree on every decidable verdict. This pins the soundness invariant the whole
            scheme rests on (static graph == what fires at runtime) and fails on drift.
            **It immediately caught a real bug:** changed_from was lumped with changed_to and
            returned gateNo when the field wasn't written — but changed_from matches on the PRIOR
            value (prev==PreviousValue) and does NOT require a change, so the producer never
            determines it. FIX: changed_from is now ALWAYS indeterminate on on_update (never a
            definite edge → loops through a changed_from gate surface as WARN, never a hard
            block). Strictly more conservative (can only add WARN edges, never new ERROR blocks);
            integration suites re-run GREEN.
          (2) MUST-NOT-BLOCK corpus — 5 legitimate shapes (linear state machine, fan-out,
            convergent sync, same-field/different-values no-edge, conditioned self-ref) asserted
            to produce ZERO Errors (guards the dangerous false-positive failure mode).
          (3) TARJAN property test — 600 random graphs vs a brute-force transitive-closure SCC
            oracle, asserting identical partitions.
          (4) RE-ARM invariants — all-auto-match rings (size 1-5) always ERROR; convergent
            changed_to rings (size 2-5) never ERROR. All GREEN; go vet clean.
    decisions:
      - "Convergence latches = {changed_to, changed_from} ONLY. equals/not_equals/>/</contains/in
         have no prev!=V clause -> re-fire idempotently -> ALWAYS re-arm; a D-cycle gated only by
         those is a PROVABLE loop (ERROR). (Fixes the most dangerous misclassification.)"
      - "Reset detection scans EVERY node in the D-cycle for a known !=V write; indeterminate
         reset -> downgrade ERROR->WARN (never block on an unprovable reset)."
      - "Edge value mirrors runtime: aggregate all of X's writes to a gate field (any indeterminate
         writer -> edge indeterminate); ignore X's writes to NON-gate fields (kills updated_at/
         updated_by WARN spam); changed_to/changed_from on an on_create consumer -> DEFINITE-NO."
      - "Block only candidate-involving SCCs (pre-existing set already validated; overlay replaces
         the candidate's persisted version, or adds it for create/activate). Non-candidate D-ERROR
         SCC -> WARN safety-net (seed-injected loops)."
      - "Create->create cascades are NOT backstopped by P1 (each new row = fresh entityID, so the
         (ruleID,entityID) visited-set never revisits). Provable on_create D-cycles ERROR via the
         no-latch rule; documented in cascade_detect.go."
      - "Surfacing (user choice 'best/most-debuggable end product'): detector returns structured
         CascadeAnalysis (cycle path + human reason per tier); ERROR blocks w/ path at all hooks;
         DryRunValidate returns the full analysis in ValidationResult.Cascade for the editor;
         WARN/INFO logged at the write hooks."
    done_when: "detector enforces at both hooks, active-only — ALL MET"
