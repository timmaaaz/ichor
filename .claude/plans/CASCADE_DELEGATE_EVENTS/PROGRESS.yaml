        title: "Integration tests (DB-backed detector + HTTP enforcement) + regression"
        status: done
        verified: |
          NEW ruleapi/loopdetect_test.go: Test_DetectCascadeLoops drives the real
          DetectCascadeLoops against seeded Postgres rules w/ a RegisterCoreActions registry —
