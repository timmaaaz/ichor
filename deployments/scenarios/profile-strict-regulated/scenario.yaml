name: profile-strict-regulated
description: |
  All overridable scan-discipline levers set to `required`. Maximum strict mode.
  DORMANT caveat applies to cycleCount/adjustment only (F1.B/C still pending).
  pick/transfer/putaway/inspection overrides are LIVE as of F1.A, F1.D, and F1.E merges.

lever_overrides:
  pick.sourceLocationScan: required
  pick.destinationScan: required
  pick.lotScan: required-if-lot-tracked
  pick.assignmentGranularity: zone-sliced-order
  receive.poScan: required
  transfer.sourceLocationScan: required
  transfer.destinationScan: required
  cycleCount.locationScan: required              # DORMANT (F1.B pending) — same as default anyway
  adjustment.locationScan: required              # DORMANT (F1.C pending) — same as default anyway
  putaway.destinationLocationScan: required      # same as default
  putaway.itemScan: required                     # same as default
  putaway.lotScan: required-if-lot-tracked
  inspection.lotScan: required-if-lot-tracked
