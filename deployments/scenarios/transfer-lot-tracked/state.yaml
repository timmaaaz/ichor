# deployments/scenarios/transfer-lot-tracked/state.yaml
#
# Transfer of lot-tracked SKU-0029 from STG-A01 → STG-B01.
#
# NOTE — lot_trackings / lot_locations rows are NOT included here.
# lot_trackings.supplier_product_id is NOT NULL FK to
# procurement.supplier_products, which is not in the supported fixture-table
# set (resolveTargetTable) and has no resolver in seed_scenarios_refs.go.
# The transfer_orders + inventory_items fixture is sufficient to exercise the
# transfer UX with a lot-tracked product; full lot-identity propagation
# validation requires either:
#   (a) a supplier_product_ref resolver + supplier_products in the fixture
#       table set, or
#   (b) the bindings.Lots seeder path being implemented in seed_scenarios.go.
# Tracked in DONE_WITH_CONCERNS on this fixture set.

inventory_items:
  - location_ref: STG-A01
    product_ref: SKU-0029
    quantity: 60
    reserved_quantity: 0
    allocated_quantity: 0
    minimum_stock: 0
    maximum_stock: 200
    reorder_point: 10
    economic_order_quantity: 30
    safety_stock: 5
    avg_daily_usage: 2
    created_date: "2026-05-06T08:00:00Z"
    updated_date: "2026-05-06T08:00:00Z"

transfer_orders:
  - _label: xfer
    transfer_number: "TXF-LOT-001"
    product_ref: SKU-0029
    from_location_ref: STG-A01
    to_location_ref: STG-B01
    requested_by_ref: floor_worker1
    quantity: 60
    status: pending
    transfer_date: "2026-05-06T09:00:00Z"
    created_date: "2026-05-06T08:00:00Z"
    updated_date: "2026-05-06T08:00:00Z"
