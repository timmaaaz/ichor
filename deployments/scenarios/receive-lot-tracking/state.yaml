# deployments/scenarios/receive-lot-tracking/state.yaml
#
# Receive PO with three lot-tracked SKUs (SKU-0029, SKU-0030, SKU-0031), one
# lot per SKU, each materialised at a separate location via lot_locations.
#
# supplier_products self-authored per scenario because supplier_products has
# no stable natural key in the seeded data (random part numbers). lot_trackings
# references supplier_product_id (NOT product_id), so we wire it via
# supplier_product_row_ref → supplier_product_id.
#
# quality_status MUST be one of {good, on_hold, quarantined, released, expired}
# per the inventory.lot_trackings CHECK constraint at migrate.sql:659.
# "good" is the canonical value for a freshly-received lot.

