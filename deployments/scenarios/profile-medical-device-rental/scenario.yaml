name: profile-medical-device-rental
description: |
  FDA UDI-regulated profile per master spec §3.7 bundle. All lever overrides
  in this profile are LIVE — F1.A (pick/transfer), F1.D (putaway), and F1.E
  (inspection) have all merged. useCycleCount and useAdjustment are still
  pending (F1.B/C) but this profile does not override their levers.

lever_overrides:
  pick.lotScan: required-if-lot-tracked
  pick.sourceLocationScan: required
  pick.destinationScan: required
  transfer.sourceLocationScan: required
  transfer.destinationScan: required
  putaway.lotScan: required-if-lot-tracked
  putaway.destinationLocationScan: required
  inspection.lotScan: required-if-lot-tracked
