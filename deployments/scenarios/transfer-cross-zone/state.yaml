# deployments/scenarios/transfer-cross-zone/state.yaml
#
# 100 units of SKU-0001 (untracked) available at STG-A01, with a pending
# transfer order to move them to SHP-01 (cross-zone: storage → shipping).
#
# from_location_ref / to_location_ref are resolver keys added in
# seed_scenarios_refs.go alongside this fixture; both delegate to
# locationIDByCode and output from_location_id / to_location_id respectively.
#
# requested_by_ref → requested_by (non-standard column on transfer_orders;
# explicit resolver entry required because jsonb_populate_record matches on
# the exact DB column name, not the conventional "<prefix>_id" form).

inventory_items:
  - location_ref: STG-A01
    product_ref: SKU-0001
    quantity: 100
    reserved_quantity: 0
    allocated_quantity: 0
    minimum_stock: 0
    maximum_stock: 500
    reorder_point: 20
    economic_order_quantity: 50
    safety_stock: 10
    avg_daily_usage: 5
    created_date: "2026-05-06T08:00:00Z"
    updated_date: "2026-05-06T08:00:00Z"

transfer_orders:
  - _label: xfer
    transfer_number: "TXF-CROSS-001"
    product_ref: SKU-0001
    from_location_ref: STG-A01
    to_location_ref: SHP-01
    requested_by_ref: floor_worker1
    quantity: 100
    status: pending
    transfer_date: "2026-05-06T09:00:00Z"
    created_date: "2026-05-06T08:00:00Z"
    updated_date: "2026-05-06T08:00:00Z"
